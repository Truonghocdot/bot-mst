[program:bot-mst-worker]
directory=/var/www/html/bot-mst/worker
command=/usr/bin/npm run crawl
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=360
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/supervisor/bot-mst-worker.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=10
environment=HOME="/var/www",NODE_ENV="production"
