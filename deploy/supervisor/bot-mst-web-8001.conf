[program:bot-mst-web]
directory=/var/www/html/bot-mst/core
command=/usr/bin/php artisan serve --host=127.0.0.1 --port=8001
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=30
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/supervisor/bot-mst-web.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=10
environment=APP_ENV="production"
