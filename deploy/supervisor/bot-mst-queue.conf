[program:bot-mst-queue]
directory=/var/www/html/bot-mst/core
command=/usr/bin/php artisan queue:work redis --queue=ingest,telegram --sleep=1 --tries=3 --timeout=120
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=360
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/supervisor/bot-mst-queue.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=10
environment=APP_ENV="production"
